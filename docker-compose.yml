# version: '3.8'

services:
  app:
    build:
      context: .
      args:
        BUILD_TAGS: ${BUILD_TAGS:-}  # BUILD_TAGS=pro for premium; unset = community
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=sessiondb
      - DB_PASSWORD=sessiondb_password
      - DB_NAME=sessiondb
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379
      - DB_CREDENTIAL_ENCRYPTION_KEY=12345678901234567890123456789012
      - MIGRATE_TOKEN=${MIGRATE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  migrate-via-api:
    image: curlimages/curl:latest
    command:
      - sh
      - -c
      - |
        until curl -sf http://app:8080/health; do echo "waiting for app"; sleep 2; done
        curl -sf -X POST http://app:8080/v1/migrate -H "X-Migrate-Token: $$MIGRATE_TOKEN"
    environment:
      - MIGRATE_TOKEN=${MIGRATE_TOKEN}
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sessiondb
      - POSTGRES_PASSWORD=sessiondb_password
      - POSTGRES_DB=sessiondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sessiondb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
